{% extends 'layouts/base.html' %}

{% block title %}Đăng Nhập{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 60vh;
    }
    
    .auth-card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        padding: 3rem;
        width: 100%;
        max-width: 420px;
        animation: fadeInUp 0.5s ease-out;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .auth-card h2 {
        text-align: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
    }
    
    .auth-card .subtitle {
        text-align: center;
        color: #7f8c8d;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.6rem;
        color: #2c3e50;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.5px;
    }
    
    .form-group input {
        width: 100%;
        padding: 0.9rem 1.1rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        background: rgba(102, 126, 234, 0.02);
    }
    
    .form-group button {
        width: 100%;
        padding: 1rem;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .form-group button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .password-options {
        text-align: right;
        margin-top: -1rem;
        margin-bottom: 1.5rem;
    }

    .password-options a {
        color: #667eea;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
    }
    
    .form-footer {
        text-align: center;
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
    }
    
    .form-footer p {
        color: #7f8c8d;
        font-size: 0.95rem;
    }
    
    .form-footer a {
        color: #667eea;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s;
    }
    
    .form-footer a:hover {
        color: #764ba2;
        text-decoration: underline;
    }
    
    .icon-wrapper {
        text-align: center;
        font-size: 3rem;
        margin-bottom: 1rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="icon-wrapper">🔐</div>
        <h2>Đăng Nhập</h2>
        <p class="subtitle">Tiếp tục hành trình học tập của bạn</p>
        
        <form method="POST" novalidate>
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Tên Người Dùng</label>
                <input type="text" id="username" name="username" required placeholder="Nhập tên người dùng của bạn">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Mật Khẩu</label>
                <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu của bạn">
            </div>

            <div class="password-options">
                <a href="{% url 'password_reset' %}">Quên mật khẩu?</a>
            </div>
            
            <div class="form-group">
                <button type="submit"><i class="fas fa-sign-in-alt"></i> Đăng Nhập</button>
            </div>
        </form>
        
        <div class="form-footer">
            <p>Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a></p>
        </div>
    </div>
</div>
{% endblock %}
