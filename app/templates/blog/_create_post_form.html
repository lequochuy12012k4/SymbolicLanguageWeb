<form action="{% url 'create_post' %}" method="post" enctype="multipart/form-data" id="create-post-form">
    {% csrf_token %}
    <div class="p-3">
        <textarea name="{{ post_form.content.name }}" id="post-content-textarea-modal" class="form-control border-0" 
                  placeholder="Bạn đang nghĩ gì?" 
                  rows="4" style="max-height: 400px; overflow-y: auto;"></textarea>
        
        <!-- Preview Container -->
        <div id="media-preview" class="mt-3"></div>

    </div>
    <div class="d-flex justify-content-between align-items-center p-3 border-top">
        <div>
            <label for="id_image" class="btn btn-sm btn-light me-2"><i class="fas fa-image text-success"></i></label>
            <input type="file" name="{{ post_form.image.name }}" id="id_image" accept="image/*" class="d-none">
            
            <label for="id_video" class="btn btn-sm btn-light"><i class="fas fa-video text-danger"></i></label>
            <input type="file" name="{{ post_form.video.name }}" id="id_video" accept="video/*" class="d-none">
        </div>
        <button type="submit" class="btn btn-primary btn-sm">Đăng</button>
    </div>
</form>
